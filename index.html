<!DOCTYPE html>

    <title>AgriSmart</title>

<body>

<h1>AgriSmart - Storage Risk Checker</h1>
<p>Reducing post-harvest losses through smart storage monitoring.</p>
<label>Select Crop:</label>
<select id="crop">
    <option>Tomato</option>
    <option>Onion</option>
    <option>Potato</option>
</select>

<br><br>

<label>Temperature (°C):</label>
<input type="number" id="temp">

<br><br>

<label>Storage Days:</label>
<input type="number" id="days">

<br><br>

<button onclick="checkStorage()">Check Risk</button>

<h2 id="result"></h2>

<script src="script.js"></script>

</body>
</html>
